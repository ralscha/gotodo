<ion-app>
  <ion-split-pane contentId="main-content">
    <ion-menu [hidden]="!authenticated()" contentId="main-content">
      <ion-header>
        <ion-toolbar color="primary">
          <ion-title>GoTodo</ion-title>
        </ion-toolbar>
      </ion-header>
      <ion-content>
        @if (authenticated()) {
          <ion-list lines="none">
            @for (page of appPages(); track page.url) {
              <ion-menu-toggle autoHide="false">
                <ion-item routerDirection="root" [routerLink]="page.url" routerLinkActive="active">
                  <ion-icon [name]="page.icon" slot="start" />
                  <ion-label>{{ page.title }}</ion-label>
                </ion-item>
              </ion-menu-toggle>
            }
          </ion-list>
        }
      </ion-content>
    </ion-menu>

    <ion-router-outlet id="main-content" />
  </ion-split-pane>
</ion-app>
